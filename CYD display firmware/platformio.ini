[env:cyd-display]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI
    bblanchon/ArduinoJson

build_flags =
    -D USER_SETUP_LOADED=1

    ; CYD display driver
    -D ILI9341_2_DRIVER=1

    ; Display resolution
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=240

    ; Common CYD SPI pins
    -D TFT_MOSI=13
    -D TFT_MISO=12
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH

    ; Fonts
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1